{% from "partials/badge_status.html" import badge_status %}
<div
  class="cliente-card group relative overflow-hidden rounded-2xl border border-[#334155]/80 bg-[#1e293b]/90 shadow-xl shadow-black/20 transition-all duration-200 hover:border-[#475569] hover:shadow-2xl hover:shadow-black/30"
  data-status="{{ cliente.status }}"
  data-cliente-id="{{ cliente.id }}"
>
  <a
    href="{{ url_for('views.cliente_detalhe', id=cliente.id) }}"
    class="relative block p-6 transition-all duration-200 hover:scale-[1.02]"
  >
    <div class="absolute inset-0 bg-gradient-to-br from-white/[0.04] to-transparent opacity-0 transition-opacity duration-200 group-hover:opacity-100 pointer-events-none"></div>
    <div class="relative mb-6 flex items-start justify-between gap-3">
      <h3 class="text-base font-semibold leading-snug text-[#f1f5f9] group-hover:text-white">{{ cliente.nome }}</h3>
      {{ badge_status(cliente.label, cliente.classe) }}
    </div>
    <p class="relative text-xs font-medium uppercase tracking-wide text-[#94a3b8]">CPL atual</p>
    <p class="relative mt-1 text-3xl font-bold tabular-nums tracking-tight text-[#f1f5f9]">
      {% if cliente.cpl_atual is not none %}
        R$ {{ "%.2f"|format(cliente.cpl_atual)|replace(".", ",") }}
      {% else %}
        —
      {% endif %}
    </p>
  </a>
  <div class="border-t border-[#334155]/60 px-4 py-3">
    <button
      type="button"
      class="btn-remover-cliente w-full rounded-lg border border-red-500/30 px-3 py-2 text-xs font-semibold text-red-400 transition-colors hover:border-red-500/50 hover:bg-red-500/10"
      data-id="{{ cliente.id }}"
      data-nome="{{ cliente.nome }}"
    >
      Remover
    </button>
  </div>
</div>
