<div
  id="modal-metrica"
  class="modal-overlay fixed inset-0 z-50 hidden items-center justify-center bg-black/60 px-4 backdrop-blur-sm"
>
  <div class="modal-panel w-full max-w-xl rounded-2xl border border-[#334155] bg-[#1e293b] p-6 shadow-2xl shadow-black/40 max-h-[90vh] overflow-y-auto">
    <div class="mb-5 flex items-center justify-between">
      <div>
        <h2 class="text-lg font-semibold text-[#f1f5f9]">Adicionar métrica</h2>
        <p class="mt-0.5 text-xs text-[#94a3b8]">Registro diário de performance</p>
      </div>
      <button
        type="button"
        class="close-modal flex h-9 w-9 items-center justify-center rounded-lg text-[#94a3b8] transition-colors hover:bg-[#334155]/50 hover:text-[#f1f5f9]"
        data-target="modal-metrica"
        aria-label="Fechar"
      >✕</button>
    </div>
    <form id="form-metrica" class="grid grid-cols-1 gap-4 md:grid-cols-2">
      <input type="hidden" name="cliente_id" value="{{ cliente.id }}">
      <div class="md:col-span-1">
        <label class="mb-1.5 block text-xs font-medium uppercase tracking-wide text-[#94a3b8]">Data *</label>
        <input name="data" type="date" class="field-dark w-full rounded-xl border border-[#334155] bg-[#0f172a] px-4 py-2.5 text-sm text-[#f1f5f9] outline-none focus:border-green-500/50 focus:ring-2 focus:ring-green-500/20" required>
      </div>
      <div>
        <label class="mb-1.5 block text-xs font-medium uppercase tracking-wide text-[#94a3b8]">CPL</label>
        <input name="cpl" type="number" step="0.01" class="field-dark w-full rounded-xl border border-[#334155] bg-[#0f172a] px-4 py-2.5 text-sm text-[#f1f5f9] outline-none focus:border-green-500/50 focus:ring-2 focus:ring-green-500/20">
      </div>
      <div>
        <label class="mb-1.5 block text-xs font-medium uppercase tracking-wide text-[#94a3b8]">CTR</label>
        <input name="ctr" type="number" step="0.01" class="field-dark w-full rounded-xl border border-[#334155] bg-[#0f172a] px-4 py-2.5 text-sm text-[#f1f5f9] outline-none focus:border-green-500/50 focus:ring-2 focus:ring-green-500/20">
      </div>
      <div>
        <label class="mb-1.5 block text-xs font-medium uppercase tracking-wide text-[#94a3b8]">CPC</label>
        <input name="cpc" type="number" step="0.01" class="field-dark w-full rounded-xl border border-[#334155] bg-[#0f172a] px-4 py-2.5 text-sm text-[#f1f5f9] outline-none focus:border-green-500/50 focus:ring-2 focus:ring-green-500/20">
      </div>
      <div>
        <label class="mb-1.5 block text-xs font-medium uppercase tracking-wide text-[#94a3b8]">Conversões</label>
        <input name="conversoes" type="number" class="field-dark w-full rounded-xl border border-[#334155] bg-[#0f172a] px-4 py-2.5 text-sm text-[#f1f5f9] outline-none focus:border-green-500/50 focus:ring-2 focus:ring-green-500/20">
      </div>
      <div>
        <label class="mb-1.5 block text-xs font-medium uppercase tracking-wide text-[#94a3b8]">Investimento</label>
        <input name="investimento" type="number" step="0.01" class="field-dark w-full rounded-xl border border-[#334155] bg-[#0f172a] px-4 py-2.5 text-sm text-[#f1f5f9] outline-none focus:border-green-500/50 focus:ring-2 focus:ring-green-500/20">
      </div>
      <div class="col-span-full flex justify-end gap-2 pt-1">
        <button type="button" class="close-modal rounded-xl border border-[#334155] px-4 py-2.5 text-sm font-medium text-[#94a3b8] transition-all hover:bg-[#0f172a] hover:text-[#f1f5f9]" data-target="modal-metrica">Cancelar</button>
        <button type="submit" class="btn-submit rounded-xl bg-green-500 px-5 py-2.5 text-sm font-semibold text-slate-950 shadow-lg shadow-green-500/20 transition hover:bg-green-400">Salvar</button>
      </div>
    </form>
  </div>
</div>
