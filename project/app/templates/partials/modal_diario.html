<div
  id="modal-diario"
  class="modal-overlay fixed inset-0 z-50 hidden items-center justify-center bg-black/60 px-4 backdrop-blur-sm"
>
  <div class="modal-panel w-full max-w-xl rounded-2xl border border-[#334155] bg-[#1e293b] p-6 shadow-2xl shadow-black/40 max-h-[90vh] overflow-y-auto">
    <div class="mb-5 flex items-center justify-between">
      <div>
        <h2 class="text-lg font-semibold text-[#f1f5f9]">Nova entrada</h2>
        <p class="mt-0.5 text-xs text-[#94a3b8]">Diário operacional</p>
      </div>
      <button
        type="button"
        class="close-modal flex h-9 w-9 items-center justify-center rounded-lg text-[#94a3b8] transition-colors hover:bg-[#334155]/50 hover:text-[#f1f5f9]"
        data-target="modal-diario"
        aria-label="Fechar"
      >✕</button>
    </div>
    <form id="form-diario" class="space-y-4">
      <input type="hidden" name="cliente_id" value="{{ cliente.id }}">
      <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
        <div>
          <label class="mb-1.5 block text-xs font-medium uppercase tracking-wide text-[#94a3b8]">Data *</label>
          <input name="data" type="date" class="field-dark w-full rounded-xl border border-[#334155] bg-[#0f172a] px-4 py-2.5 text-sm text-[#f1f5f9] outline-none focus:border-green-500/50 focus:ring-2 focus:ring-green-500/20" required>
        </div>
        <div>
          <label class="mb-1.5 block text-xs font-medium uppercase tracking-wide text-[#94a3b8]">Tipo *</label>
          <select name="tipo" class="field-dark w-full rounded-xl border border-[#334155] bg-[#0f172a] px-4 py-2.5 text-sm text-[#f1f5f9] outline-none focus:border-green-500/50 focus:ring-2 focus:ring-green-500/20" required>
            <option value="criativo">Criativo</option>
            <option value="ajuste">Ajuste</option>
            <option value="teste">Teste</option>
            <option value="analise">Análise</option>
            <option value="outro">Outro</option>
          </select>
        </div>
      </div>
      <div>
        <label class="mb-1.5 block text-xs font-medium uppercase tracking-wide text-[#94a3b8]">Descrição *</label>
        <textarea name="descricao" rows="3" class="field-dark w-full resize-none rounded-xl border border-[#334155] bg-[#0f172a] px-4 py-2.5 text-sm text-[#f1f5f9] outline-none focus:border-green-500/50 focus:ring-2 focus:ring-green-500/20" required></textarea>
      </div>
      <div>
        <label class="mb-1.5 block text-xs font-medium uppercase tracking-wide text-[#94a3b8]">Tags (vírgula)</label>
        <input name="tags" type="text" placeholder="copy, segmentação" class="field-dark w-full rounded-xl border border-[#334155] bg-[#0f172a] px-4 py-2.5 text-sm text-[#f1f5f9] outline-none placeholder:text-[#64748b] focus:border-green-500/50 focus:ring-2 focus:ring-green-500/20">
      </div>
      <div class="flex justify-end gap-2 pt-1">
        <button type="button" class="close-modal rounded-xl border border-[#334155] px-4 py-2.5 text-sm font-medium text-[#94a3b8] transition-all hover:bg-[#0f172a] hover:text-[#f1f5f9]" data-target="modal-diario">Cancelar</button>
        <button type="submit" class="btn-submit rounded-xl bg-green-500 px-5 py-2.5 text-sm font-semibold text-slate-950 shadow-lg shadow-green-500/20 transition hover:bg-green-400">Salvar</button>
      </div>
    </form>
  </div>
</div>
